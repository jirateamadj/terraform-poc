name: Terraform DEV

# Cuándo se dispara este workflow (flujo de trabajo)
on:
  push:
    branches:
      - main
    paths:
      - 'environments/dev/**'
      - 'modules/**'
  pull_request:
    branches:
      - main
    paths:
      - 'environments/dev/**'
      - 'modules/**'

# Variables de entorno disponibles para todos los jobs (trabajos)
env:
  TF_CLOUD_ORGANIZATION: "Leinad"
  TF_WORKSPACE: "dev"
  TF_VAR_nombre: "Daniel"

jobs:
  terraform:
    name: Terraform Plan & Apply - DEV
    runs-on: ubuntu-latest  # corre en un servidor Linux de GitHub

    steps:
      # Paso 1: descarga el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # Paso 2: instala Terraform en el servidor de GitHub
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      # Paso 3: inicializa Terraform
      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init

      # Paso 4: verifica que el formato del código sea correcto
      - name: Terraform Format Check
        working-directory: environments/dev
        run: terraform fmt -check

      # Paso 5: valida que el código no tenga errores de sintaxis
      - name: Terraform Validate
        working-directory: environments/dev
        run: terraform validate

      # Paso 6: muestra qué cambiaría (corre siempre)
      - name: Terraform Plan
        working-directory: environments/dev
        run: terraform plan

      # Paso 7: aplica los cambios (solo en push a main, no en PR)
      - name: Terraform Apply
        working-directory: environments/dev
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
